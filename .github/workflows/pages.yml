name: Validate and deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run repository checks
        run: python 10_Working/validate_site.py --production

      - name: Validate HTML
        run: npx --yes html-validate@11.5.6 index.html privacy.html 404.html

      - name: Start local website
        run: python -m http.server 5055 --bind 127.0.0.1 > /tmp/alpinno-http.log 2>&1 &

      - name: Wait for local website
        run: |
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:5055/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/alpinno-http.log
          exit 1

      - name: Run Lighthouse
        run: npx --yes @lhci/cli@0.15.1 autorun --config=.lighthouserc.json

      - name: Build Pages artifact
        run: python 10_Working/build_site.py --clean --output _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
